<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" width="320" height="96">

  <!-- Left side: Pizza emblem -->
  <circle cx="48" cy="48" r="38" fill="none" stroke="#d97706" stroke-width="3.5"/>
  <circle cx="48" cy="48" r="34" fill="#fbbf24"/>
  <circle cx="48" cy="48" r="26" fill="#ef4444" opacity="0.65"/>
  <!-- Slice dividers -->
  <line x1="48" y1="14" x2="48" y2="82" stroke="#d97706" stroke-width="1.4"/>
  <line x1="14" y1="48" x2="82" y2="48" stroke="#d97706" stroke-width="1.4"/>
  <line x1="24" y1="24" x2="72" y2="72" stroke="#d97706" stroke-width="1.4"/>
  <line x1="72" y1="24" x2="24" y2="72" stroke="#d97706" stroke-width="1.4"/>
  <!-- Pepperoni toppings -->
  <circle cx="48" cy="32" r="6" fill="#dc2626"/>
  <circle cx="63" cy="57" r="5" fill="#dc2626"/>
  <circle cx="33" cy="57" r="5" fill="#dc2626"/>
  <!-- Pepperoni shine -->
  <circle cx="46.5" cy="30.5" r="2" fill="rgba(255,255,255,0.28)"/>
  <circle cx="61.5" cy="55.5" r="1.6" fill="rgba(255,255,255,0.28)"/>
  <circle cx="31.5" cy="55.5" r="1.6" fill="rgba(255,255,255,0.28)"/>

  <!-- Divider line -->
  <line x1="100" y1="16" x2="100" y2="80" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Right side: Wordmark -->
  <!-- "Pi" thin weight -->
  <text x="114" y="58" font-size="38" font-weight="300"
        fill="#1d1d1d" font-family="Arial,sans-serif">Pi</text>
  <!-- "Wee" medium weight in orange -->
  <text x="155" y="58" font-size="38" font-weight="600"
        fill="#f97316" font-family="Arial,sans-serif">Wee</text>
  <!-- "Za" bold in red -->
  <text x="238" y="58" font-size="38" font-weight="800"
        fill="#dc2626" font-family="Arial,sans-serif">Za</text>

  <!-- Tagline -->
  <text x="114" y="76" font-size="11" font-weight="400"
        fill="#6c757d" font-family="Arial,sans-serif"
        letter-spacing="2.5">SISTEMA POS</text>

</svg>
